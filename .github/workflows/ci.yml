name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Unit tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Script checks
        run: |
          ./scripts/check-tun-scripts.sh
          ./scripts/check-operational-examples.sh

      - name: Build binaries
        run: |
          go build -buildvcs=false -o /tmp/mvp-vpn-lite-server ./cmd/server
          go build -buildvcs=false -o /tmp/mvp-vpn-lite-client ./cmd/client
